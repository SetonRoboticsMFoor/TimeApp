<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>US World Clock</title>
    <style>
        :root {
            --bg-color: #f4f4f4;
            --text-color: #222222;
            --border-color: #444444;
            --glow: none;
            --control-bg: #ffffff;
        }

        body.dark-mode {
            --bg-color: #101015; 
            --text-color: #a0eaff; /* Light Blue */
            --border-color: #a0eaff; 
            --glow: 0 0 25px rgba(160, 234, 255, 0.7); /* Light Blue Glow */
            --control-bg: #1a1a22;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: all 0.4s ease;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Courier New', Courier, monospace;
        }

        #clock-container {
            text-align: center;
            margin-bottom: 30px;
        }

        #clock {
            font-size: 5rem;
            font-weight: bold;
            border: 3px solid var(--border-color);
            padding: 25px 40px;
            border-radius: 15px;
            box-shadow: var(--glow);
            margin-bottom: 10px;
            display: inline-block;
        }

        #zone-display {
            font-size: 1.2rem;
            opacity: 0.8;
            margin-top: 10px;
        }

        .controls {
            display: flex;
            gap: 15px;
            flex-direction: column;
            align-items: center;
            width: 320px;
        }

        select, button {
            width: 100%;
            padding: 12px;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: var(--control-bg);
            color: var(--text-color);
            font-family: inherit;
        }

        @media (max-width: 600px) {
            #clock { font-size: 3rem; }
        }
    </style>
</head>
<body class="dark-mode">

    <div id="clock-container">
        <div id="clock">00:00:00</div>
        <div id="zone-display">My Local Time</div>
    </div>

    <div class="controls">
        <select id="timezoneSelector">
            <option value="local">My Local Time</option>
            <optgroup label="US Standard Time Zones">
                <option value="America/New_York">Eastern Time (ET)</option>
                <option value="America/Chicago">Central Time (CT)</option>
                <option value="America/Denver">Mountain Time (MT)</option>
                <option value="America/Phoenix">Mountain Time (AZ - No DST)</option>
                <option value="America/Los_Angeles">Pacific Time (PT)</option>
            </optgroup>
            <optgroup label="US Non-Contiguous Zones">
                <option value="America/Anchorage">Alaska Time (AKT)</option>
                <option value="Pacific/Honolulu">Hawaii Standard Time (HST)</option>
            </optgroup>
        </select>

        <button id="modeToggle">Switch to Light Mode</button>
    </div>

    <script>
        const clockElement = document.getElementById('clock');
        const zoneDisplayElement = document.getElementById('zone-display');
        const timezoneSelector = document.getElementById('timezoneSelector');
        const btn = document.getElementById('modeToggle');

        function updateClock() {
            const now = new Date();
            const selectedZone = timezoneSelector.value;

            let timeOptions = {
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: true 
            };
            
            if (selectedZone !== "local") {
                timeOptions.timeZone = selectedZone;
            }

            clockElement.textContent = now.toLocaleTimeString('en-US', timeOptions);

            // Update the display name of the zone
            if (selectedZone === "local") {
                zoneDisplayElement.textContent = "My Local Time";
            } else {
                const zoneNameOptions = { timeZone: selectedZone, timeZoneName: 'long' };
                const formatter = new Intl.DateTimeFormat('en-US', zoneNameOptions);
                const parts = formatter.formatToParts(now);
                const tzName = parts.find(part => part.type === 'timeZoneName').value;
                zoneDisplayElement.textContent = tzName;
            }
        }

        setInterval(updateClock, 1000);
        updateClock();

        timezoneSelector.addEventListener('change', updateClock);

        btn.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
            btn.textContent = document.body.classList.contains('dark-mode') 
                ? "Switch to Light Mode" 
                : "Switch to Dark Mode";
        });
    </script>
</body>
</html>
