<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>US World Clock</title>
    <style>
        :root {
            /* Light Mode Variables */
            --bg-color: #f4f4f4;
            --text-color: #222222;
            --border-color: #444444;
            --glow: none;
            --control-bg: #ffffff;
        }

        body.dark-mode {
            /* Dark Mode Variables */
            --bg-color: #101015; /* Deeper black */
            --text-color: #a0eaff; /* The new Light Blue text */
            --border-color: #a0eaff; /* Matching light blue border */
            --glow: 0 0 25px rgba(160, 234, 255, 0.7); /* Soft Light Blue Glow */
            --control-bg: #1a1a22;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: all 0.4s ease; /* Smoother fade */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Courier New', Courier, monospace;
        }

        #clock-container {
            text-align: center;
            margin-bottom: 30px;
        }

        #clock {
            font-size: 5rem;
            font-weight: bold;
            border: 3px solid var(--border-color);
            padding: 25px 40px;
            border-radius: 15px;
            box-shadow: var(--glow);
            margin-bottom: 10px;
            display: inline-block;
        }

        #zone-display {
            font-size: 1.2rem;
            opacity: 0.8;
            margin-top: 10px;
        }

        .controls {
            display: flex;
            gap: 15px;
            flex-direction: column;
            align-items: center;
            width: 300px;
        }

        select, button {
            width: 100%;
            padding: 12px;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: var(--control-bg);
            color: var(--text-color);
            font-family: inherit;
            transition: background 0.3s;
        }

        select:focus, button:focus {
            outline: 2px solid var(--text-color);
            outline-offset: 2px;
        }

        /* Responsive design for smaller screens */
        @media (max-width: 600px) {
            #clock {
                font-size: 3rem;
                padding: 15px 20px;
            }
        }
    </style>
</head>
<body class="dark-mode"> <div id="clock-container">
        <div id="clock">00:00:00</div>
