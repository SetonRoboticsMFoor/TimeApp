<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Clock App</title>
    <style>
        :root {
            --bg-color: #f0f0f0;
            --text-color: #333333;
            --border-color: #333333;
            --glow: none;
        }

        body.dark-mode {
            --bg-color: #1a1a1a;
            --text-color: #00ffcc;
            --border-color: #00ffcc;
            --glow: 0 0 20px #00ffcc;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Courier New', Courier, monospace;
        }

        #clock {
            font-size: 4rem;
            border: 2px solid var(--border-color);
            padding: 20px;
            border-radius: 10px;
            box-shadow: var(--glow);
            margin-bottom: 20px;
            text-align: center;
        }

        .controls {
            display: flex;
            gap: 10px;
            flex-direction: column;
            align-items: center;
        }

        select, button {
            padding: 10px;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 5px;
            border: 1px solid var(--border-color);
            background: var(--bg-color);
            color: var(--text-color);
        }
    </style>
</head>
<body>

    <div id="clock">00:00:00</div>

    <div class="controls">
        <select id="timezoneSelector">
            <option value="local">My Local Time</option>
            <option value="UTC">UTC (Universal)</option>
            <option value="America/New_York">New York (EST)</option>
            <option value="Europe/London">London (GMT)</option>
            <option value="Asia/Tokyo">Tokyo (JST)</option>
            <option value="Australia/Sydney">Sydney (AEST)</option>
        </select>

        <button id="modeToggle">Switch to Dark Mode</button>
    </div>

    <script>
        const clockElement = document.getElementById('clock');
        const timezoneSelector = document.getElementById('timezoneSelector');
        const btn = document.getElementById('modeToggle');

        function updateClock() {
            const now = new Date();
            const selectedZone = timezoneSelector.value;

            let options = {};
            if (selectedZone !== "local") {
                options = { timeZone: selectedZone };
            }

            clockElement.textContent = now.toLocaleTimeString('en-US', options);
        }

        // Update the clock every second
        setInterval(updateClock, 1000);
        updateClock();

        // Dark Mode Toggle Logic
        btn.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
            btn.textContent = document.body.classList.contains('dark-mode') 
                ? "Switch to Light Mode" 
                : "Switch to Dark Mode";
        });
    </script>
</body>
</html>
